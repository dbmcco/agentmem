services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agentmem
      POSTGRES_USER: agentmem
      POSTGRES_PASSWORD: agentmem
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmem"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
